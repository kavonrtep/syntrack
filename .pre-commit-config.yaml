# Fast local checks run before `git commit`. Install with:
#   ./dev.sh pre-commit install
# Run on all files manually with:
#   ./dev.sh pre-commit run --all-files
# Skip on a single commit with `git commit --no-verify`.
#
# Hooks run in isolated envs managed by the pre-commit framework, so they
# work without activating the project venv. CI runs the same ruff version
# via the `ruff-pre-commit` pin below.

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin matches the floor in pyproject.toml [project.optional-dependencies]
    # ruff>=0.7. Bump together when upgrading.
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
