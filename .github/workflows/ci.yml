name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — pytest / ruff / mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          # We don't commit a uv.lock (pyproject.toml is the source of truth);
          # invalidate the cache when pyproject changes. Leaving the default
          # **/uv.lock glob would error on repos that don't ship one.
          cache-dependency-glob: pyproject.toml
      - name: Create venv + install project with dev deps
        # Recent Ubuntu images ship PEP 668-marked Python, which rejects
        # `uv pip install --system`. Install into an explicit venv instead
        # and add its bin to $GITHUB_PATH so later steps find ruff / mypy /
        # pytest without activation.
        run: |
          uv venv --python 3.12
          uv pip install --python .venv/bin/python -e ".[dev]"
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"
      - name: Ruff
        run: ruff check syntrack tests
      - name: Ruff format check
        run: ruff format --check syntrack tests
      - name: Mypy
        run: mypy
      - name: Pytest (unit + api, no --integration)
        run: pytest -q

  frontend:
    name: Frontend — svelte-check / vitest / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run check
      - run: npm test
      - run: npm run build

  image-smoke:
    name: Docker — build + --help smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: syntrack:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: syntrack --version
        run: docker run --rm syntrack:ci --version
      - name: syntrack --help
        run: docker run --rm syntrack:ci --help
      - name: syntrack serve --help
        run: docker run --rm syntrack:ci serve --help
