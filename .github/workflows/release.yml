name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create / update GitHub Release
  packages: write   # push to GHCR

jobs:
  docker:
    name: Build + push Docker image to GHCR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kavonrtep/syntrack
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=SynTrack
            org.opencontainers.image.description=Genome synteny visualisation tool.
            org.opencontainers.image.licenses=MIT
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sif:
    name: Build SIF + attach release assets
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.4.1
      - name: Compute release tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sif=syntrack-${TAG}.sif" >> "$GITHUB_OUTPUT"
      - name: Build SIF from published image
        run: |
          apptainer build \
            "${{ steps.tag.outputs.sif }}" \
            "docker://ghcr.io/kavonrtep/syntrack:${{ steps.tag.outputs.tag }}"
      - name: sha256
        run: sha256sum "${{ steps.tag.outputs.sif }}" > "${{ steps.tag.outputs.sif }}.sha256"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.tag.outputs.sif }}
            ${{ steps.tag.outputs.sif }}.sha256
            deploy/docker-compose.yml
            deploy/README.md
            syntrack_config.example.yaml
          body: |
            ## Install

            ### Docker
            ```bash
            docker pull ghcr.io/kavonrtep/syntrack:${{ steps.tag.outputs.tag }}
            ```
            See `deploy/README.md` for the recommended Compose workflow.

            ### Apptainer (HPC)
            ```bash
            wget https://github.com/kavonrtep/syntrack/releases/download/${{ steps.tag.outputs.tag }}/${{ steps.tag.outputs.sif }}
            # verify
            wget https://github.com/kavonrtep/syntrack/releases/download/${{ steps.tag.outputs.tag }}/${{ steps.tag.outputs.sif }}.sha256
            sha256sum -c ${{ steps.tag.outputs.sif }}.sha256
            ```
